services:
  # ── FastAPI Backend ────────────────────────────────────────────────────────
  - type: web
    name: coc-tracker-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.11"
      # Mặc định backend đã dùng proxy free của RoyaleAPI (cocproxy.royaleapi.dev)
      # để né vấn đề Render free không có IP tĩnh. Set giá trị dưới đây nếu bạn
      # có IP tĩnh thật và muốn gọi trực tiếp api.clashofclans.com.
      - key: COC_BASE_URL
        value: "https://cocproxy.royaleapi.dev/v1"

  # ── Next.js Frontend ───────────────────────────────────────────────────────
  - type: web
    name: coc-tracker-web
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false   # điền URL của backend Render, VD: https://coc-tracker-api.onrender.com
      - key: NODE_VERSION
        value: "20"
